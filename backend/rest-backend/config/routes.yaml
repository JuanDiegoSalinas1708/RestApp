# ============ AUTH ============
api_auth_registro:
    path: /api/auth/registro
    controller: App\Controller\AuthController::registro
    methods: [POST]

api_auth_login:
    path: /api/auth/login
    controller: App\Controller\AuthController::login
    methods: [POST]

api_auth_verificar:
    path: /api/auth/verificar/{token}
    controller: App\Controller\AuthController::verificarEmail
    methods: [GET]

api_auth_recuperar:
    path: /api/auth/recuperar
    controller: App\Controller\AuthController::recuperarPassword
    methods: [POST]

api_auth_restablecer:
    path: /api/auth/restablecer/{token}
    controller: App\Controller\AuthController::restablecerPassword
    methods: [POST]

# ============ PRODUCTOS ============
api_productos_get:
    path: /api/productos
    controller: App\Controller\ProductosController::productos
    methods: [GET]

api_productos_post:
    path: /api/productos
    controller: App\Controller\ProductosController::crearProducto
    methods: [POST]

api_productos_put:
    path: /api/productos/{id}
    controller: App\Controller\ProductosController::editarProducto
    methods: [PUT]

api_productos_delete:
    path: /api/productos/{id}
    controller: App\Controller\ProductosController::eliminarProducto
    methods: [DELETE]

