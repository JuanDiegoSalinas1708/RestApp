<div class="login-container">
  <div class="login-card">
    <div class="login-hero">
      <div class="hero-content">
        <h1>Bienvenido de nuevo</h1>
        <p>Accede para gestionar tus datos y ver tu panel.</p>
      </div>
    </div>

    <div class="login-form">
      <h2>Iniciar Sesión</h2>

      <div *ngIf="error" class="error">{{ error }}</div>

      <div class="form-group">
        <label>Correo</label>
        <input type="email" [(ngModel)]="correo" placeholder="correo@ejemplo.com" />
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="password" placeholder="••••••••" />
      </div>

      <div class="checkbox-group">
        <label>
          <input type="checkbox" [(ngModel)]="rememberMe" /> Recordarme
        </label>
        <a class="forgot-link" routerLink="/login">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="button" (click)="login()">Iniciar Sesión</button>

      <p class="register-text">¿No tienes cuenta? <a routerLink="/registro">Regístrate aquí</a></p>
    </div>
  </div>
</div>
