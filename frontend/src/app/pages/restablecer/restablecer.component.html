<div class="restablecer-container">
  <div class="restablecer-card">
    <div class="logo">
      <div class="logo-icon">🔐</div>
      <h2>App<span>Rest</span></h2>
    </div>

    <h1>Restablecer contraseña</h1>
    <p class="subtitle">Ingresa tu nueva contraseña</p>

    <form (ngSubmit)="onSubmit()" class="restablecer-form">
      <div class="input-group">
        <label>Nueva contraseña <span class="required">*</span></label>
        <div class="input-icon">
          <span class="icon">🔒</span>
          <input type="password" [(ngModel)]="nuevaPassword" name="nuevaPassword" placeholder="Ingresa tu nueva contraseña" required>
        </div>
      </div>

      <div class="input-group">
        <label>Confirmar contraseña <span class="required">*</span></label>
        <div class="input-icon">
          <span class="icon">🔒</span>
          <input type="password" [(ngModel)]="confirmarPassword" name="confirmarPassword" placeholder="Confirma tu nueva contraseña" required>
        </div>
      </div>

      <button type="submit" class="btn-restablecer" [disabled]="cargando">
        {{ cargando ? 'Restableciendo...' : 'Restablecer contraseña' }}
      </button>
    </form>

    <div class="separator">
      <span>O</span>
    </div>

    <p class="login-link">
      <a routerLink="/login">Volver al inicio de sesión</a>
    </p>
  </div>
</div>

<app-modal
  [visible]="modalVisible"
  [titulo]="modalTitulo"
  [mensaje]="modalMensaje"
  [tipo]="modalTipo"
  (confirmado)="onModalConfirmado()"
></app-modal>
