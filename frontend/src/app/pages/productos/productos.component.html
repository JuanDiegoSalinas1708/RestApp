<div class="productos-container">
  <div class="contenido">
    <h2>📦 Productos Disponibles</h2>

    <!-- Formulario para crear producto -->
    <div class="form-container">
      <h3>➕ Agregar Nuevo Producto</h3>
      <form (ngSubmit)="crearProducto()">
        <div class="campo">
          <input type="text" [(ngModel)]="nuevoProducto.nombre" name="nombre" placeholder="Nombre" required>
        </div>
        <div class="campo">
          <input type="number" [(ngModel)]="nuevoProducto.precio" name="precio" placeholder="Precio" step="0.01" required>
        </div>
        <div class="campo">
          <input type="text" [(ngModel)]="nuevoProducto.descripcion" name="descripcion" placeholder="Descripción" required>
        </div>
        <button type="submit" class="btn-agregar">Agregar Producto</button>
      </form>
    </div>

    <!-- Tabla de productos -->
    <div class="tabla-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Descripción</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let p of productos">
            <td>{{ p.id }}</td>
            <td>{{ p.nombre }}</td>
            <td>${{ p.precio }}</td>
            <td>{{ p.descripcion }}</td>
            <td class="acciones">
              <button class="btn-editar" (click)="abrirModalEdicion(p)">✏️ Editar</button>
              <button class="btn-eliminar" (click)="confirmarEliminar(p.id)">🗑️ Eliminar</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal de edición -->
<app-modal
  *ngIf="modalEdicionVisible"
  [visible]="modalEdicionVisible"
  titulo="Editar Producto"
  tipo="info"
  [mostrarCancelar]="true"
  textoConfirmar="Guardar Cambios"
  textoCancelar="Cancelar"
  (confirmado)="guardarEdicionModal()"
  (cancelado)="cerrarModalEdicion()"
>
  <div class="modal-form">
    <div class="campo">
      <label>Nombre</label>
      <input type="text" [(ngModel)]="productoEditando.nombre" placeholder="Nombre del producto">
    </div>
    <div class="campo">
      <label>Precio</label>
      <input type="number" [(ngModel)]="productoEditando.precio" step="0.01" placeholder="Precio">
    </div>
    <div class="campo">
      <label>Descripción</label>
      <input type="text" [(ngModel)]="productoEditando.descripcion" placeholder="Descripción">
    </div>
  </div>
</app-modal>
<!-- Modal genérico -->
<app-modal
  [visible]="modalVisible"
  [titulo]="modalTitulo"
  [mensaje]="modalMensaje"
  [tipo]="modalTipo"
  [mostrarCancelar]="modalMostrarCancelar"
  (confirmado)="onModalConfirmado()"
  (cancelado)="onModalCancelado()"
></app-modal>
